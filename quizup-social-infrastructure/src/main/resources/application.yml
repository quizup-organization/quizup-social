spring:
  application:
    name: quizup-social
  profiles:
    default: local

  flyway:
    locations: classpath:db/migration/social

axon:
  distributed:
    enabled: true

microservice:
  swagger:
    description: QuizUp Social Module - Friendships, friend requests and challenges

logging:
  level:
    io.github.quizup: ${QUIZUP_LOG_LEVEL:INFO}
